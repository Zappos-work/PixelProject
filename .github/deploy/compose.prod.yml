name: pixelproject

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ops/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      API_SERVER_URL: ${API_SERVER_URL:-http://backend:8000/api/v1}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://pixel.zappos-dev.work/api/v1}
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 6

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_NAME: ${APP_NAME:-PixelProject API}
      SECRET_KEY: ${SECRET_KEY}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-https://pixel.zappos-dev.work}
      FRONTEND_APP_URL: ${FRONTEND_APP_URL:-https://pixel.zappos-dev.work}
      SQL_ECHO: ${SQL_ECHO:-false}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-https://pixel.zappos-dev.work/api/v1/auth/google/callback}
      AUTH_SESSION_COOKIE_NAME: ${AUTH_SESSION_COOKIE_NAME:-pixelproject_session}
      AUTH_SESSION_MAX_AGE_HOURS: ${AUTH_SESSION_MAX_AGE_HOURS:-720}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
      HOLDERS_UNLIMITED_DEFAULT: ${HOLDERS_UNLIMITED_DEFAULT:-true}
      HOLDER_START_AMOUNT: ${HOLDER_START_AMOUNT:-128}
      HOLDER_START_LIMIT: ${HOLDER_START_LIMIT:-1000}
      HOLDER_REGENERATION_INTERVAL_SECONDS: ${HOLDER_REGENERATION_INTERVAL_SECONDS:-10}
      CLAIM_AREA_START_LIMIT: ${CLAIM_AREA_START_LIMIT:-1}
      NORMAL_PIXEL_START_AMOUNT: ${NORMAL_PIXEL_START_AMOUNT:-64}
      NORMAL_PIXEL_START_LIMIT: ${NORMAL_PIXEL_START_LIMIT:-64}
      NORMAL_PIXEL_REGENERATION_INTERVAL_SECONDS: ${NORMAL_PIXEL_REGENERATION_INTERVAL_SECONDS:-30}
      LEVEL_UP_HOLDERS_STEP: ${LEVEL_UP_HOLDERS_STEP:-256}
      WORLD_ORIGIN_X: ${WORLD_ORIGIN_X:--2000}
      WORLD_ORIGIN_Y: ${WORLD_ORIGIN_Y:--2000}
      WORLD_CHUNK_SIZE: ${WORLD_CHUNK_SIZE:-4000}
      WORLD_EXPANSION_BUFFER: ${WORLD_EXPANSION_BUFFER:-0}
      WORLD_EXPANSION_CLAIM_FILL_RATIO: ${WORLD_EXPANSION_CLAIM_FILL_RATIO:-0.7}
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pixelproject}
      POSTGRES_USER: ${POSTGRES_USER:-pixelproject}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres18_data:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-pixelproject} -d ${POSTGRES_DB:-pixelproject}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  postgres18_data:
  redis_data:
