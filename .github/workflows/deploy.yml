name: Deploy PixelProject

on:
  push:
    branches:
      - main

concurrency:
  group: pixelproject-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PIXEL_SSH_KEY }}" > ~/.ssh/pixel_key
          chmod 600 ~/.ssh/pixel_key
          ssh-keyscan -p "${{ secrets.PIXEL_SSH_PORT }}" "${{ secrets.PIXEL_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on server
        id: deploy
        run: |
          set +e

          ssh -i ~/.ssh/pixel_key -p "${{ secrets.PIXEL_SSH_PORT }}" deploy@${{ secrets.PIXEL_HOST }} 'bash -s' <<'REMOTE' 2>&1 | tee deploy.log
          set -euo pipefail

          git config --global --add safe.directory /opt/pixelproject

          cd /opt/pixelproject

          git fetch origin main
          git reset --hard origin/main

          compose_prod() {
            docker compose --project-directory /opt/pixelproject -f /opt/pixelproject/.github/deploy/compose.prod.yml "$@"
          }

          set_env_value() {
            local key="$1"
            local value="$2"

            if grep -q "^${key}=" .env; then
              sed -i "s|^${key}=.*|${key}=${value}|" .env
            else
              printf '\n%s=%s\n' "$key" "$value" >> .env
            fi
          }

          set_env_value WORLD_CHUNK_SIZE 4000
          set_env_value WORLD_ORIGIN_X -2000
          set_env_value WORLD_ORIGIN_Y -2000
          set_env_value WORLD_EXPANSION_BUFFER 0
          set_env_value WORLD_EXPANSION_CLAIM_FILL_RATIO 0.7
          set_env_value APP_ENV production
          set_env_value AUTH_COOKIE_SECURE true
          set_env_value BACKEND_CORS_ORIGINS https://pixel.zappos-dev.work
          set_env_value FRONTEND_APP_URL https://pixel.zappos-dev.work
          set_env_value NEXT_PUBLIC_API_BASE_URL https://pixel.zappos-dev.work/api/v1
          set_env_value GOOGLE_REDIRECT_URI https://pixel.zappos-dev.work/api/v1/auth/google/callback

          export WORLD_CHUNK_SIZE=4000
          export WORLD_ORIGIN_X=-2000
          export WORLD_ORIGIN_Y=-2000
          export WORLD_EXPANSION_BUFFER=0
          export WORLD_EXPANSION_CLAIM_FILL_RATIO=0.7
          export APP_ENV=production
          export AUTH_COOKIE_SECURE=true
          export BACKEND_CORS_ORIGINS=https://pixel.zappos-dev.work
          export FRONTEND_APP_URL=https://pixel.zappos-dev.work
          export NEXT_PUBLIC_API_BASE_URL=https://pixel.zappos-dev.work/api/v1
          export GOOGLE_REDIRECT_URI=https://pixel.zappos-dev.work/api/v1/auth/google/callback

          bash tools/upgrade-postgres-18.sh --compose-file /opt/pixelproject/.github/deploy/compose.prod.yml

          if ! compose_prod up -d --build --remove-orphans; then
            compose_prod ps || true
            compose_prod logs --tail=200 frontend backend caddy || true
            exit 1
          fi
          docker image prune -f

          compose_prod ps

          for attempt in $(seq 1 30); do
            if curl -fsS https://pixel.zappos-dev.work/api/v1/health > /dev/null; then
              break
            fi

            if [ "$attempt" -eq 30 ]; then
              echo "Backend health check did not recover in time." >&2
              exit 1
            fi

            sleep 2
          done

          for attempt in $(seq 1 30); do
            if curl -fsS https://pixel.zappos-dev.work/health > /dev/null; then
              break
            fi

            if [ "$attempt" -eq 30 ]; then
              echo "Frontend health check did not recover in time." >&2
              compose_prod ps || true
              compose_prod logs --tail=200 frontend caddy || true
              exit 1
            fi

            sleep 2
          done

          compose_prod exec -T backend python - <<'PY'
          import asyncio

          from app.db.session import AsyncSessionLocal
          from app.services.world import get_world_overview


          async def main() -> None:
              async with AsyncSessionLocal() as session:
                  world = await get_world_overview(session)

              assert (world.origin.x, world.origin.y) == (-2000, -2000), world.origin
              assert (world.bounds.min_world_x, world.bounds.max_world_x) == (-2000, 2000), world.bounds
              assert (world.bounds.min_world_y, world.bounds.max_world_y) == (-2000, 2000), world.bounds
              print(
                  "Verified centered world origin:",
                  world.origin.x,
                  world.origin.y,
                  world.bounds.min_world_x,
                  world.bounds.max_world_x,
                  world.bounds.min_world_y,
                  world.bounds.max_world_y,
              )


          asyncio.run(main())
          PY

          LAST_COMMIT_SUBJECT="$(git log -1 --pretty=%s)"
          if printf '%s' "$LAST_COMMIT_SUBJECT" | grep -Fq "[run-production-heart-reset-20260423-1]"; then
            compose_prod exec -T backend python -m app.cli.reset_seed_production_world
          elif printf '%s' "$LAST_COMMIT_SUBJECT" | grep -Fq "[run-production-heart-reset-20260423-2]"; then
            compose_prod exec -T backend python -m app.cli.reset_seed_production_world --target-width 22 --target-height 26
          elif printf '%s' "$LAST_COMMIT_SUBJECT" | grep -Fq "[run-production-heart-reset-20260423-3]"; then
            compose_prod exec -T backend python -m app.cli.reset_seed_production_world --image-path /app/app/assets/heart-manual.png
          fi
          REMOTE

          STATUS=${PIPESTATUS[0]}
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

          exit 0

      - name: Notify Discord success
        if: steps.deploy.outputs.status == '0'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL is not configured; skipping success notification."
            exit 0
          fi

          curl -sS -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content\":\"PixelProject deploy successful.\nBranch: main\nCommit: ${{ github.sha }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"

      - name: Notify Discord failure
        if: steps.deploy.outputs.status != '0'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL is not configured; skipping failure notification."
            exit 0
          fi

          tail -c 180000 deploy.log > deploy_error.log

          curl -sS -X POST "$DISCORD_WEBHOOK_URL" \
            -F 'payload_json={"content":"PixelProject deploy FAILED. Error log is attached."}' \
            -F "files[0]=@deploy_error.log;type=text/plain"

      - name: Fail workflow if deploy failed
        if: steps.deploy.outputs.status != '0'
        run: |
          exit 1
